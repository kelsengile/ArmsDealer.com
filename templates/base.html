<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% block title %} {% endblock %}
    <link rel="icon" type="image/png"
        href="{{ url_for('static', filename='../../static/assets/images/pageimages/globalmages/armsdealerlogo.png') }}">
    <link
        href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Share+Tech+Mono&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/globalstyles.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/navbarstyles.css') }}">
    {% block styles %} {% endblock %}
</head>


<body>

    <div class="settings-overlay" id="settingsOverlay"></div>
    <!-- ═══════════════════════════════════════════════════════════ -->
    <!-- SETTINGS SIDEBAR                                            -->
    <!-- ═══════════════════════════════════════════════════════════ -->
    <aside class="settings-sidebar" id="settingsSidebar" aria-label="Settings">

        <div class="set-header">
            <span class="set-header-title" data-translate="settings"></span>
            <button class="set-close" id="settingsClose" aria-label="Close settings">✕</button>
        </div>

        <nav class="set-nav">
            <div class="set-section-label" data-translate="preferences"></div>

            <a href="{{ url_for('settings') }}"
                class="set-item active {% if request.endpoint == 'settings' %}nav-active{% endif %}">
                <span class="set-icon">◉</span>
                <span data-translate="account"></span>
                <span class="set-arrow">▶</span>
            </a>

            <a href="{{ url_for('settings') }}"
                class="set-item active {% if request.endpoint == 'settings' %}nav-active{% endif %}">
                <span class="set-icon">◉</span>
                <span data-translate="appearance"></span>
                <span class="set-arrow">▶</span>
            </a>

            <a href="{{ url_for('settings') }}"
                class="set-item active {% if request.endpoint == 'settings' %}nav-active{% endif %}">
                <span class="set-icon">◉</span>
                <span data-translate="appearance"></span>
                <span class="set-arrow">▶</span>
            </a>

            <a href="{{ url_for('settings') }}"
                class="set-item active {% if request.endpoint == 'settings' %}nav-active{% endif %}">
                <span class="set-icon">◉</span>
                <span data-translate="privacy_security"></span>
                <span class="set-arrow">▶</span>
            </a>

            <div class="set-divider"></div>
            <div class="set-section-label" data-translate="general"></div>

            <a href="{{ url_for('settings') }}"
                class="set-item active {% if request.endpoint == 'settings' %}nav-active{% endif %}">
                <span class="set-icon">◉</span>
                <span data-translate="language_region"></span>
                <span class="set-arrow">▶</span>
            </a>

            <a href="{{ url_for('settings') }}"
                class="set-item active {% if request.endpoint == 'settings' %}nav-active{% endif %}">
                <span class="set-icon">◉</span>
                <span data-translate="help_support"></span>
                <span class="set-arrow">▶</span>
            </a>

            <div class="set-divider"></div>
            <div class="set-section-label" data-translate="advanced"></div>

            <a href="{{ url_for('settings') }}"
                class="set-item active {% if request.endpoint == 'settings' %}nav-active{% endif %}">
                <span class="set-icon">◉</span>
                <span data-translate="system_actions"></span>
                <span class="set-arrow">▶</span>
            </a>
        </nav>

    </aside>

    <!-- ═══════════════════════════════════════════════════════════ -->
    <!-- STICKY HEADER WRAPPER                                        -->
    <!-- ═══════════════════════════════════════════════════════════ -->
    <header class="site-header">

        <!-- TOP BAR -->
        <div class="top-bar">
            <div class="left">
                <button id="settingsOpenBtn" aria-label="Open Settings">☰</button>
                <div class="top-bar-status">
                    <div class="top-bar-status-dot"></div>
                    <span data-translate="secure_connection"></span>
                </div>
            </div>
            <div class="right">
                <select id="languageSelect" onchange="setLanguage(this.value)">
                    <option value="english">🌐 English</option>
                    <option value="filipino">🌐 Filipino</option>
                    <option value="japanese">🌐 Japanese</option>
                    <option value="spanish">🌐 Spanish</option>
                    <option value="mandarin">🌐 Mandarin</option>
                </select>
                <select aria-label="Currency">
                    <option>PHP (₱)</option>
                    <option>USD ($)</option>
                    <option>EUR (€)</option>
                </select>
                <a href="{{ url_for('about') }}" class="{% if request.endpoint == 'about' %}nav-active{% endif %}"
                    data-translate="about"></a>
                <a href="{{ url_for('contacts') }}" class="{% if request.endpoint == 'contacts' %}nav-active{% endif %}"
                    data-translate="contacts"></a>
                <a href="{{ url_for('legal') }}" class="{% if request.endpoint == 'legal' %}nav-active{% endif %}"
                    data-translate="legal"></a>
            </div>
        </div>

        <!-- ═══════════════════════════════════════════════════════════ -->
        <!-- NAV BAR                                       -->
        <!-- ═══════════════════════════════════════════════════════════ -->
        <nav class="navbar" aria-label="Main navigation">
            <a href="{{ url_for('homepage') }}" class="logo-container" aria-label="ArmsDealer Home">
                <div class="logoimage" role="img" aria-label="ArmsDealer logo"></div>
                <div class="logo-text-wrap">
                    <div class="logo" data-translate="companyname"></div>
                    <div class="logo-sub" data-translate="class"></div>
                </div>
            </a>

            <!-- Desktop nav links -->
            <div class="nav-links">
                <a href="{{ url_for('products') }}" class="{% if request.endpoint == 'products' %}nav-active{% endif %}"
                    data-translate="products"></a>
                <a href="{{ url_for('services') }}" class="{% if request.endpoint == 'services' %}nav-active{% endif %}"
                    data-translate="services"></a>
                <button class="nav-btn-search" aria-label="Search"></button>
                <button class="nav-btn-cart" aria-label="Cart">
                    <!-- <span class="cart-badge" aria-hidden="true"></span> --></button>
                <button class="nav-btn-account" aria-label="Account"></button>
            </div>

            <!-- Coordinate readout (decorative) -->
            <div class="nav-coord" aria-hidden="true">
                <div><span>LAT</span> 14.5995° N</div>
                <div><span>LNG</span> 120.9842° E</div>
            </div>

            <!-- Mobile hamburger -->
            <button class="nav-hamburger" id="navHamburger" aria-controls="navDrawer" aria-expanded="false"
                aria-label="Toggle menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </nav>

        <!-- Mobile drawer -->
        <div class="nav-drawer" id="navDrawer" role="menu">
            <a href="{{ url_for('products') }}" class="{% if request.endpoint == 'products' %}nav-active{% endif %}"
                role="menuitem"><span class="nav-drawer-icon">◈</span><span data-translate="products"></span></a>
            <a href="{{ url_for('services') }}" class="{% if request.endpoint == 'services' %}nav-active{% endif %}"
                role="menuitem"><span class="nav-drawer-icon">◈</span><span data-translate="services"></span></a>
            <button class="nav-btn-search" role="menuitem"><span class="nav-drawer-icon"></span><span
                    data-translate="search"></span></button>
            <button class="nav-btn-cart" role="menuitem">
                <span class="nav-drawer-icon"></span><span data-translate="cart"></span><span class="cart-badge"
                    aria-hidden="true"></span></button>
            <button class="nav-btn-account" role="menuitem"><span class="nav-drawer-icon"></span><span
                    data-translate="account"></span></button>
        </div>

    </header>

    {% block main %}
    {% endblock%}
    <script src="{{ url_for('static', filename='js/navbarfunctions.js') }}"></script>
    <script src="{{ url_for('static', filename='js/translations.js') }}"></script>
</body>
