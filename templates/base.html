<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% block title %} {% endblock %}
    <link rel="icon" type="image/png"
        href="{{ url_for('static', filename='../../static/assets/images/pageimages/globalmages/armsdealerlogo.png') }}">
    <link
        href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Share+Tech+Mono&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/globalstyles.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/navbarstyles.css') }}">
    {% block styles %} {% endblock %}
</head>


<body>

    <div class="settings-overlay" id="settingsOverlay"></div>
    <!-- ═══════════════════════════════════════════════════════════ -->
    <!-- SETTINGS SIDEBAR                                            -->
    <!-- ═══════════════════════════════════════════════════════════ -->
    <aside class="settings-sidebar" id="settingsSidebar" aria-label="Settings">

        <div class="set-header">
            <span class="set-header-title">Settings</span>
            <button class="set-close" id="settingsClose" aria-label="Close settings">✕</button>
        </div>

        <nav class="set-nav">
            <div class="set-section-label">Preferences</div>

            <button class="set-item active" data-page="account">
                <span class="set-icon">◉</span>
                Account
                <span class="set-arrow">▶</span>
            </button>

            <button class="set-item" data-page="appearance">
                <span class="set-icon">◈</span>
                Appearance
                <span class="set-arrow">▶</span>
            </button>

            <button class="set-item" data-page="notifications">
                <span class="set-icon">◎</span>
                Notifications
                <span class="set-arrow">▶</span>
            </button>

            <button class="set-item" data-page="privacy">
                <span class="set-icon">⊕</span>
                Privacy &amp; Security
                <span class="set-arrow">▶</span>
            </button>

            <div class="set-divider"></div>
            <div class="set-section-label">General</div>

            <button class="set-item" data-page="language">
                <span class="set-icon">⊞</span>
                Language &amp; Region
                <span class="set-arrow">▶</span>
            </button>

            <button class="set-item" data-page="help">
                <span class="set-icon">⊘</span>
                Help &amp; Support
                <span class="set-arrow">▶</span>
            </button>

            <div class="set-divider"></div>
            <div class="set-section-label">Advanced</div>

            <button class="set-item" data-page="system">
                <span class="set-icon">⊟</span>
                System Actions
                <span class="set-arrow">▶</span>
            </button>
        </nav>

    </aside>

    <!-- ═══════════════════════════════════════════════════════════ -->
    <!-- STICKY HEADER WRAPPER                                        -->
    <!-- ═══════════════════════════════════════════════════════════ -->
    <header class="site-header">

        <!-- TOP BAR -->
        <div class="top-bar">
            <div class="left">
                <button id="settingsOpenBtn" aria-label="Open Settings">☰</button>
                <div class="top-bar-status">
                    <div class="top-bar-status-dot"></div>
                    <span>Secure Connection</span>
                </div>
            </div>
            <div class="right">
                <select aria-label="Language">
                    <option>🌐 English</option>
                    <option>🌐 Filipino</option>
                    <option>🌐 Japanese</option>
                    <option>🌐 Spanish</option>
                </select>
                <select aria-label="Currency">
                    <option>PHP (₱)</option>
                    <option>USD ($)</option>
                    <option>EUR (€)</option>
                </select>
                <a routerLink="{{ url_for('about') }}">About</a>
                <a routerLink="{{ url_for('contacts') }}">Contacts</a>
                <a routerLink="{{ url_for('legal') }}">Legal</a>
            </div>
        </div>

        <!-- ═══════════════════════════════════════════════════════════ -->
        <!-- NAV BAR                                       -->
        <!-- ═══════════════════════════════════════════════════════════ -->
        <nav class="navbar" aria-label="Main navigation">
            <a href="{{ url_for('homepage') }}" class="logo-container" aria-label="ArmsDealer Home">
                <div class="logoimage" role="img" aria-label="ArmsDealer logo"></div>
                <div class="logo-text-wrap">
                    <div class="logo">ArmsDealer</div>
                    <div class="logo-sub">Tactical Supply Co.</div>
                </div>
            </a>

            <!-- Desktop nav links -->
            <div class="nav-links">
                <a href="{{ url_for('products') }}"
                    class="{% if request.endpoint == 'products' %}nav-active{% endif %}">Products</a>
                <a href="{{ url_for('services') }}"
                    class="{% if request.endpoint == 'services' %}nav-active{% endif %}">Services</a>
                <button class="nav-btn-search" aria-label="Search"></button>
                <button class="nav-btn-cart" aria-label="Cart">
                    <!-- <span class="cart-badge" aria-hidden="true"></span> --></button>
                <button class="nav-btn-account" aria-label="Account"></button>
            </div>

            <!-- Coordinate readout (decorative) -->
            <div class="nav-coord" aria-hidden="true">
                <div><span>LAT</span> 14.5995° N</div>
                <div><span>LNG</span> 120.9842° E</div>
            </div>

            <!-- Mobile hamburger -->
            <button class="nav-hamburger" id="navHamburger" aria-controls="navDrawer" aria-expanded="false"
                aria-label="Toggle menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </nav>

        <!-- Mobile drawer -->
        <div class="nav-drawer" id="navDrawer" role="menu">
            <a href="{{ url_for('products') }}" class="{% if request.endpoint == 'products' %}nav-active{% endif %}"
                role="menuitem"><span class="nav-drawer-icon">◈</span>Products</a>
            <a href="{{ url_for('services') }}" class="{% if request.endpoint == 'services' %}nav-active{% endif %}"
                role="menuitem"><span class="nav-drawer-icon">◈</span>Services</a>
            <button class="nav-btn-search" role="menuitem"><span class="nav-drawer-icon"></span>Search</button>
            <button class="nav-btn-cart" role="menuitem">
                <span class="nav-drawer-icon"></span>Cart<span class="cart-badge" aria-hidden="true"></span></button>
            <button class="nav-btn-account" role="menuitem"><span class="nav-drawer-icon"></span>Account</button>
        </div>

    </header>

    {% block main %} {% endblock%}
</body>
