<!-- SETTINGS SIDEBAR                                            -->
<!-- ═══════════════════════════════════════════════════════════ -->
<div class="settings-overlay" id="settingsOverlay"></div>
<aside class="settings-sidebar" id="settingsSidebar" aria-label="Settings">
    <div class="set-header">
        <span class="set-header-title" data-translate="navbarsettings"></span>
        <button class="set-close" id="settingsClose" aria-label="Close settings">✕</button>
    </div>
    <nav class="set-nav">
        <div class="set-section-label" data-translate="navbarpreferences"></div>
        <a href="{{ url_for('main.settings', section='account') }}"
            class="set-item {% if request.endpoint == 'main.settings' and request.args.get('section') == 'account' %}nav-active{% endif %}"
            data-section="account">
            <span class="set-icon">◉</span>
            <span data-translate="navbaraccount"></span>
            <span class="set-arrow">▶</span>
        </a>
        <a href="{{ url_for('main.settings', section='privacy') }}"
            class="set-item {% if request.endpoint == 'main.settings' and request.args.get('section') == 'privacy' %}nav-active{% endif %}"
            data-section="privacy">
            <span class="set-icon">◉</span>
            <span data-translate="navbarprivacy_security"></span>
            <span class="set-arrow">▶</span>
        </a>
        <a href="{{ url_for('main.settings', section='appearance') }}"
            class="set-item {% if request.endpoint == 'main.settings' and request.args.get('section') == 'appearance' %}nav-active{% endif %}"
            data-section="appearance">
            <span class="set-icon">◉</span>
            <span data-translate="navbarappearance"></span>
            <span class="set-arrow">▶</span>
        </a>
        <a href="{{ url_for('main.settings', section='notifications') }}"
            class="set-item {% if request.endpoint == 'main.settings' and request.args.get('section') == 'notifications' %}nav-active{% endif %}"
            data-section="notifications">
            <span class="set-icon">◉</span>
            <span data-translate="navbarnotifications"></span>
            <span class="set-arrow">▶</span>
        </a>
        <div class="set-divider"></div>
        <div class="set-section-label" data-translate="navbargeneral"></div>
        <a href="{{ url_for('main.settings', section='language') }}"
            class="set-item {% if request.endpoint == 'main.settings' and request.args.get('section') == 'language' %}nav-active{% endif %}"

            <span class="set-icon">◉</span>
            <span data-translate="navbarlanguage_region"></span>
            <span class="set-arrow">▶</span>
        </a>
        <a href="{{ url_for('main.settings', section='help') }}"
            class="set-item {% if request.endpoint == 'main.settings' and request.args.get('section') == 'help' %}nav-active{% endif %}"

            <span class="set-icon">◉</span>

            <span class="set-arrow">▶</span>
        </a>
        <div class="set-divider"></div>
        <div class="set-section-label" data-translate="navbaradvanced"></div>
        <a href="{{ url_for('main.settings', section='system') }}"

            data-section="system">
            <span class="set-icon">◉</span>
            <span data-translate="navbarsystem_actions"></span>
            <span class="set-arrow">▶</span>
        </a>
