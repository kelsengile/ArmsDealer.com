<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% block title %} {% endblock %}
    <link rel="icon" type="image/png"
        href="{{ url_for('static', filename='../../static/assets/images/pageimages/globalmages/armsdealerlogo.png') }}">
    <link
        href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Share+Tech+Mono&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/globalstyles.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/navbarstyles.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/partialstyles/accountpanel.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/partialstyles/settingspanel.css') }}">
    {% block styles %} {% endblock %}
</head>
<body>
    {% include 'partials/settingspanel.html' %}
    {% include 'partials/accountpanel.html' %}
    <!-- ═══════════════════════════════════════════════════════════ -->
    <!-- STICKY HEADER WRAPPER                                        -->
    <!-- ═══════════════════════════════════════════════════════════ -->
    <header class="site-header">
        <!-- TOP BAR -->
        <div class="top-bar">
            <div class="left">
                <button id="settingsOpenBtn" aria-label="Open Settings">☰</button>
                <div class="top-bar-status">
                    <div class="top-bar-status-dot"></div>
                    <span data-translate="navbarsecure_connection"></span>
                </div>
            </div>
            <div class="right">
                <select id="languageSelect" onchange="setLanguage(this.value)">
                    <option value="english">🌐 English</option>
                    <option value="filipino">🌐 Filipino</option>
                    <option value="japanese">🌐 Japanese</option>
                    <option value="spanish">🌐 Spanish</option>
                    <option value="mandarin">🌐 Mandarin</option>
                </select>
                <select id="currencySelect" onchange="setCurrency(this.value)">
                    <option value="PHP">PHP (₱)</option>
                    <option value="USD">USD ($)</option>
                    <option value="EUR">EUR (€)</option>
                    <option value="JPY">JPY (JP¥)</option>
                    <option value="CNY">CNY (CN¥)</option>
                </select>
                <a href="{{ url_for('main.about') }}" class="{% if request.endpoint == 'about' %}nav-active{% endif %}"
                    data-translate="navbarabout"></a>
                <a href="{{ url_for('main.contacts') }}" class="{% if request.endpoint == 'contacts' %}nav-active{% endif %}"
                    data-translate="navbarcontacts"></a>
                <a href="{{ url_for('main.legal') }}" class="{% if request.endpoint == 'legal' %}nav-active{% endif %}"
                    data-translate="navbarlegal"></a>
            </div>
        </div>
        <!-- ═══════════════════════════════════════════════════════════ -->
        <!-- NAV BAR                                       -->
        <!-- ═══════════════════════════════════════════════════════════ -->
        <nav class="navbar" aria-label="Main navigation">
            <a href="{{ url_for('main.homepage') }}" class="logo-container" aria-label="ArmsDealer Home">
                <div class="logoimage" role="img" aria-label="ArmsDealer logo"></div>
                <div class="logo-text-wrap">
                    <div class="logo" data-translate="navbarcompanyname"></div>
                    <div class="logo-sub" data-translate="navbarclass"></div>
                </div>
            </a>
            <!-- Desktop nav links -->
            <div class="nav-links">
                <a href="{{ url_for('main.products') }}" class="{% if request.endpoint == 'products' %}nav-active{% endif %}"
                    data-translate="navbarproducts"></a>
                <a href="{{ url_for('main.services') }}" class="{% if request.endpoint == 'services' %}nav-active{% endif %}"
                    data-translate="navbarservices"></a>
                <button class="nav-btn-search" aria-label="Search"></button>
                <button class="nav-btn-cart" aria-label="Cart">
                    <!-- <span class="cart-badge" aria-hidden="true"></span> --></button>
                <button class="nav-btn-account" aria-label="Account"></button>
            </div>
            <!-- Coordinate readout (decorative) -->
            <div class="nav-coord" aria-hidden="true">
                <div><span>LAT</span> 14.5995° N</div>
                <div><span>LNG</span> 120.9842° E</div>
            </div>
            <!-- Mobile hamburger -->
            <button class="nav-hamburger" id="navHamburger" aria-controls="navDrawer" aria-expanded="false"
                aria-label="Toggle menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </nav>
        <!-- Mobile drawer -->
        <div class="nav-drawer" id="navDrawer" role="menu">
            <a href="{{ url_for('main.products') }}" class="{% if request.endpoint == 'products' %}nav-active{% endif %}"
                role="menuitem"><span class="nav-drawer-icon">◈</span><span data-translate="navbarproducts"></span></a>
            <a href="{{ url_for('main.services') }}" class="{% if request.endpoint == 'services' %}nav-active{% endif %}"
                role="menuitem"><span class="nav-drawer-icon">◈</span><span data-translate="navbarservices"></span></a>
            <button class="nav-btn-search" role="menuitem"><span class="nav-drawer-icon"></span><span
                    data-translate="navbarsearch"></span></button>
            <button class="nav-btn-cart" role="menuitem">
                <span class="nav-drawer-icon">
                    <svg width="14" height="14" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg"><path d="M1 1h2l2.4 8.4a1 1 0 0 0 1 .6h5.2a1 1 0 0 0 .97-.76L14 5H4" stroke="currentColor" stroke-width="1.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><circle cx="6.5" cy="13" r="1" fill="currentColor"/><circle cx="11.5" cy="13" r="1" fill="currentColor"/></svg>
                </span><span data-translate="navbarcart"></span><span class="cart-badge" aria-hidden="true"></span></button>
            <button class="nav-btn-account" role="menuitem">
                <span class="nav-drawer-icon">
                    <svg width="13" height="13" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg"><circle cx="8" cy="5" r="3" fill="currentColor"/><path d="M2 14c0-3.3 2.7-6 6-6s6 2.7 6 6" stroke="currentColor" stroke-width="1.4" fill="none" stroke-linecap="round"/></svg>
                </span><span data-translate="navbaraccount"></span></button>
        </div>
    </header>
    {% block main %}
    {% endblock%}
    <script src="{{ url_for('static', filename='js/translations.js') }}"></script>
    <script src="{{ url_for('static', filename='js/navbarfunctions.js') }}"></script>
    <script src="{{ url_for('static', filename='js/partialfunctions/accountpanel.js') }}"></script>
    <script src="{{ url_for('static', filename='js/partialfunctions/settingspanel.js') }}"></script>
</body>
