<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArmsDealer</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #1e1e1e;
            color: #fff;
        }

        /* NAVBAR */
        .navbar {
            background: #6c7a6b;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-weight: bold;
            font-size: 20px;
        }

        .nav-links {
            display: flex;
            gap: 20px;
        }

        .nav-links a {
            text-decoration: none;
            color: #000;
            font-size: 14px;
        }

        /* HERO */
        .hero {
            width: 100%;
            height: 250px;
            background: url('https://via.placeholder.com/1200x400') center/cover no-repeat;
        }

        /* SECTION */
        .section {
            padding: 20px;
            background: #3e4a3f;
        }

        .section h3 {
            margin-bottom: 10px;
            font-weight: normal;
        }

        .scroll-row {
            display: flex;
            gap: 15px;
            overflow-x: auto;
        }

        .box {
            min-width: 120px;
            height: 120px;
            background: #cfd6cf;
            border-radius: 10px;
        }

        /* FEATURED */
        .featured {
            padding: 30px;
            text-align: center;
            background: #3e4a3f;
        }

        .featured h2 {
            margin-bottom: 20px;
            font-weight: normal;
        }

        .featured-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 15px;
            max-width: 800px;
            margin: auto;
        }

        .card {
            background: #e5e5e5;
            color: #000;
            padding: 10px;
            position: relative;
        }

        .card img {
            width: 100%;
            height: auto;
        }

        .small-grid {
            display: grid;
            grid-template-rows: 1fr 1fr;
            gap: 15px;
        }

        .label {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            padding: 5px 10px;
            font-size: 12px;
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <div class="navbar">
        <div class="logo">☰ ArmsDealer</div>
        <div class="nav-links">
            <a href="#">Products</a>
            <a href="#">Services</a>
            <a href="#">Contacts</a>
            <a href="#">About</a>
        </div>
    </div>

    <!-- HERO IMAGE -->
    <div class="hero"></div>

    <!-- PRODUCT CATEGORIES -->
    <div class="section">
        <h3>Product Categories:</h3>
        <div class="scroll-row">
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
        </div>
    </div>

    <!-- SERVICE CATEGORIES -->
    <div class="section">
        <h3>Service Categories:</h3>
        <div class="scroll-row">
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
        </div>
    </div>

    <!-- FEATURED -->
    <div class="featured">
        <h2>Featured</h2>

        <div class="featured-grid">
            <!-- BIG ITEM -->
            <div class="card">
                <h3>AK-47</h3>
                <img src="https://via.placeholder.com/400x300" alt="AK47">
                <div class="label">20% • 8,000</div>
            </div>

            <!-- SMALL ITEMS -->
            <div class="small-grid">
                <div class="card">
                    <h4>Katana</h4>
                    <img src="https://via.placeholder.com/200x120" alt="Katana">
                    <div class="label">20%</div>
                </div>

                <div class="card">
                    <h4>Balisong</h4>
                    <img src="https://via.placeholder.com/200x120" alt="Balisong">
                    <div class="label">20%</div>
                </div>
            </div>
        </div>

    </div>

</body>

</html>
